# Unified openGrid example configuration.
# This file intentionally lists every option consumed by examples/main.py.

output:
  # Directory where one STEP file is written per generated object.
  directory: output/

viewer:
  # true shows the same generated objects in OCP CAD Viewer after exporting STEP files.
  show: false
  # Port used by OCP CAD Viewer. If null, examples/main.py reads OCP_PORT or falls back to 3939.
  port: null
  # Display-only translations so the separate objects do not overlap in the viewer.
  slot_delete_tool_offset: [42.0, 0.0, 0.0]
  adjacent_connector_offset: [56.0, 0.0, 0.0]
  multiconnect_rail_offset: [70.0, 0.0, 0.0]
  multiconnect_receiver_offset: [98.0, 0.0, 0.0]
  multiconnect_backer_offset: [126.0, 0.0, 0.0]
  multiconnect_delete_tool_offset: [168.0, 0.0, 0.0]
  snap_threads_offset: [196.0, 0.0, 0.0]
  snap_body_offset: [224.0, 0.0, 0.0]
  expanding_snap_offset: [252.0, 0.0, 0.0]

board:
  # Options: Full, Lite, Heavy.
  kind: Full
  board_width: 3
  board_height: 5
  # If fill_space_mode is not None, board_width/board_height are ignored by build_open_grid.
  # Options: None, Complete Tiles Only, Fill Available Space.
  fill_space_mode: None
  # Fill Available Space generates multiple boards when the requested space is
  # larger than max_tile_width/max_tile_depth; tile_spacing is the gap between
  # those separate boards. For this example, 330x500mm becomes 8x8, 4x8, and
  # 4x2/8x2 edge boards rather than one monolithic board.
  space_width: 330.0
  space_depth: 500.0
  max_tile_width: 8
  max_tile_depth: 8
  tile_spacing: 5.0
  tile_size: 28.0
  tile_thickness: 6.8
  lite_tile_thickness: 4.0
  heavy_tile_thickness: 13.8
  heavy_tile_gap: 0.2
  # Options: Everywhere, Corners, None.
  chamfers: Everywhere
  chamfer_top_left: true
  chamfer_top_right: true
  chamfer_bottom_left: true
  chamfer_bottom_right: true
  connector_holes: true
  connector_holes_bottom: true
  connector_holes_right: true
  connector_holes_left: true
  connector_holes_top: true
  # Options: Everywhere, Corners, By Row and Column, Custom, None.
  screw_mounting: Everywhere
  screw_every_x_rows: 1
  screw_every_x_columns: 2
  screw_custom_positions: "011110"
  screw_diameter: 4.1
  screw_head_diameter: 7.2
  screw_head_inset: 1.0
  screw_head_is_countersunk: true
  screw_head_countersunk_degree: 90.0
  add_adhesive_base: false
  adhesive_base_thickness: 0.6
  stack_count: 1
  # Options: Interface Layer, Ironing - BETA.
  stacking_method: Interface Layer
  interface_thickness: 0.4
  interface_separation: 0.1

connector_slot_delete_tool:
  # Negative cutter for adjacent-grid connector side slots.
  radius: 2.6
  dimple_radius: 2.7
  separation: 2.5
  height: 2.4
  flare_width: 1.0

adjacent_grid_connector:
  # Positive connector that locks adjacent openGrid boards together.
  fit_clearance: 0.1

multiconnect:
  # Options: Standard, Jr., Mini, Multipoint Beta, Custom.
  profile: Standard
  # Options: Connector Round, Connector Rail, Connector Double sided Round,
  # Connector Double-Sided Rail, Connector Rail Delete Tool, Receiver Open-Ended,
  # Receiver Passthrough, Backer Open-Ended, Backer Passthrough.
  part_kind: Connector Rail
  length: 50.0
  width: 75.0
  # openGrid spacing is 28mm; Multiboard examples often use 25mm.
  grid_size: 28.0
  # Custom-profile dimensions. These are used only when profile is Custom;
  # the named presets use their source constants instead.
  radius: 10.0
  capture_depth: 1.0
  dovetail_depth: 2.5
  stem_depth: 0.5
  receiver_offset: 0.15
  dimple_radius: 1.0
  dimples_enabled: true
  dimple_scale: 1.0
  # Options: None, One Side, Both Sides.
  rounding: Both Sides
  receiver_side_wall_thickness: 2.5
  receiver_back_thickness: 2.0
  receiver_top_wall_thickness: 2.5
  on_ramps_enabled: true
  on_ramp_every_n_holes: 2
  on_ramp_start_offset: 1

snap_threads:
  # Options: Basic, Blunt.
  thread_type: Blunt
  height: 6.8
  diameter: 16.0
  clearance: 0.5
  pitch: 3.0
  top_bevel: 0.5
  bottom_bevel_standard: 2.0
  bottom_bevel_lite: 1.2
  offset_angle: 0.0
  blunt_cutoff: true

snap_body:
  # Options: Directional, Symmetric.
  body_shape: Directional
  width: 24.8
  height: 24.8
  thickness: 6.8
  corner_chamfer: 4.818376618407356
  directional_corner_fillet_radius: 1.5
  corner_edge_height: 1.5
  top_corner_extrude: 1.1
  bottom_corner_extrude: 0.6
  cut_width_inset: 6.2
  bottom_cut_thickness: 0.6
  bottom_cut_offset_to_top: 0.6
  bottom_cut_offset_to_edge: 0.7
  side_cut_thickness: 0.4
  side_cut_depth: 0.8
  side_cut_offset_to_top: 0.8
  directional_slant_height_standard: 3.4
  directional_slant_height_lite: 1.2
  directional_slant_depth_standard: 0.8
  directional_slant_depth_lite: 0.2
  basic_nub_width_inset: 7.0
  basic_nub_depth: 0.4
  basic_nub_width_tip_taper: 4.0
  basic_nub_top_angle: 35.0
  basic_nub_bottom_angle: 35.0
  basic_nub_fillet_radius: 15.0
  basic_nub_height_standard: 2.0
  basic_nub_height_lite: 1.8
  directional_nub_width_inset: 5.0
  directional_nub_depth: 0.8
  directional_nub_width_tip_taper: 1.6
  directional_nub_top_angle: 35.0
  directional_nub_height_standard: 4.0
  directional_nub_height_lite: 2.4
  directional_nub_bottom_angle_standard: 35.0
  directional_nub_bottom_angle_lite: 45.0
  directional_nub_fillet_radius: 2.8
  antidirect_nub_height_standard: 2.0
  antidirect_nub_height_lite: 1.4
  nub_offset_to_top: 1.4
  notch_width: 5.0
  notch_surface_inset: 1.0
  notch_gap_inset: 1.8
  notch_surface_height_standard: 1.2
  notch_surface_height_lite: 0.8
  notch_gap_height_standard: 1.0
  notch_gap_height_lite: 0.6
  enable_corners: true
  enable_nubs: true
  enable_cuts: true
  enable_uninstall_notch: true
  enable_directional_slants: true

expanding_snap:
  expand_distance_standard: 1.0
  expand_distance_lite: 1.2
  expand_entry_height_standard: 0.4
  expand_entry_height_lite: 0.4
  expand_entry_height_blunt: 1.0
  expand_end_height_standard: 2.0
  expand_end_height_lite: 1.2
  expand_split_angle: 45.0
  spring_thickness: 1.26
  spring_to_center_thickness: 0.84
  spring_gap: 0.42
  spring_face_chamfer: 0.2
  center_offset: [0.0, 0.0]
