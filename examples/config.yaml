# Unified openGrid example configuration.
#
# This file intentionally lists every option consumed by examples/main.py.
# Keep this file in lockstep with the config dataclasses and the exhaustive
# config coverage test. The values below are conservative demonstration values:
# they produce a printable full board, source-sized snap primitives, an
# assembled openConnect snap, openConnect/Multiconnect screws, and SVG galleries
# for visual verification.

output:
  # Purpose: Directory where examples/main.py writes all generated STEP files
  # and the verification/ SVG gallery tree.
  # Recommended: keep this as output/ for local verification so generated files
  # stay out of source directories and match the test/documentation examples.
  # The directory is deleted and recreated on every example run.
  directory: output/

verification:
  # Purpose: Control SVG visual verification exports under output/verification/.
  # enabled=false skips SVG verification entirely while keeping STEP exports.
  # variant_galleries=false writes configured-object galleries only; true writes
  # exhaustive component variant galleries for visual regression review.
  # Recommended: keep both true when intentionally reviewing geometry coverage;
  # disable variant_galleries for faster local/export runs.
  enabled: true
  variant_galleries: true

viewer:
  # Purpose: Show generated objects in OCP CAD Viewer after exporting files.
  # Recommended: false for scripted verification and CI; true only when the OCP
  # CAD Viewer panel is open in VS Code.
  show: false

  # Purpose: OCP CAD Viewer websocket port. If null, examples/main.py reads
  # OCP_PORT and then falls back to 3939.
  # Recommended: null unless your viewer uses a fixed non-default port.
  port: null

  # Purpose: Display-only translations used by OCP viewer so generated objects
  # do not overlap. They do not affect exported STEP/SVG geometry.
  # Recommended: keep monotonically increasing X offsets when adding objects.
  slot_delete_tool_offset: [42.0, 0.0, 0.0]
  adjacent_connector_offset: [56.0, 0.0, 0.0]
  multiconnect_rail_offset: [70.0, 0.0, 0.0]
  multiconnect_receiver_offset: [98.0, 0.0, 0.0]
  multiconnect_backer_offset: [126.0, 0.0, 0.0]
  multiconnect_delete_tool_offset: [168.0, 0.0, 0.0]
  snap_threads_offset: [196.0, 0.0, 0.0]
  snap_body_offset: [224.0, 0.0, 0.0]
  expanding_snap_offset: [252.0, 0.0, 0.0]
  opengrid_snap_offset: [280.0, 0.0, 0.0]
  openconnect_screw_offset: [308.0, 0.0, 0.0]
  multiconnect_screw_offset: [336.0, 0.0, 0.0]

board:
  # Purpose: Select the board cross-section/profile.
  # Options: Full, Lite, Heavy.
  # Recommended: Full for standard strength; Lite for lower-profile adhesive or
  # light-duty boards; Heavy for high-stiffness boards.
  kind: Full

  # Purpose: Number of openGrid cells in X and Y when fill_space_mode is None.
  # Recommended: use whole positive integers; start small for fast iteration.
  board_width: 3
  board_height: 5

  # Purpose: Generate one or more boards from target physical space instead of
  # board_width/board_height.
  # Options: None, Complete Tiles Only, Fill Available Space.
  # Recommended: None for explicit cell counts; Complete Tiles Only when excess
  # space should remain empty; Fill Available Space when edge boards may be
  # smaller to cover the requested space.
  fill_space_mode: None

  # Purpose: Requested physical area for fill-space modes, in millimeters.
  # Recommended: set to the real mounting area; ignored when fill_space_mode is
  # None, but still listed here for exhaustive config coverage.
  space_width: 330.0
  space_depth: 500.0

  # Purpose: Maximum generated board size in cells for fill-space partitioning.
  # Recommended: choose limits that fit your printer bed and material stiffness.
  max_tile_width: 8
  max_tile_depth: 8

  # Purpose: Gap between separate boards generated by fill-space partitioning.
  # Recommended: 5 mm for visual separation/export review; tune to mounting plan.
  tile_spacing: 5.0

  # Purpose: Nominal openGrid tile size in millimeters.
  # Recommended: 28.0 for openGrid compatibility.
  tile_size: 28.0

  # Purpose: Z thicknesses for Full, Lite, and Heavy board profiles.
  # Recommended: keep source defaults unless matching a known custom board set.
  tile_thickness: 6.8
  lite_tile_thickness: 4.0
  heavy_tile_thickness: 13.8

  # Purpose: Internal gap used by the Heavy board profile.
  # Recommended: source default 0.2 mm.
  heavy_tile_gap: 0.2

  # Purpose: Overall outside corner chamfer policy.
  # Options: Everywhere, Corners, None.
  # Recommended: Everywhere for production boards; None only for reference/debug
  # envelope checks.
  chamfers: Everywhere

  # Purpose: Per-corner enable flags used when chamfers are enabled.
  # Recommended: true for exposed outside corners; false where boards butt up
  # against adjacent geometry.
  chamfer_top_left: true
  chamfer_top_right: true
  chamfer_bottom_left: true
  chamfer_bottom_right: true

  # Purpose: Enable adjacent-grid connector slots globally and per side.
  # Recommended: true only on sides intended to receive adjacent board joiners.
  connector_holes: true
  connector_holes_bottom: true
  connector_holes_right: true
  connector_holes_left: true
  connector_holes_top: true

  # Purpose: Screw hole placement policy.
  # Options: Everywhere, Corners, By Row and Column, Custom, None.
  # Recommended: Corners for small boards; By Row and Column for large boards;
  # None for adhesive-only or test coupons.
  screw_mounting: Everywhere

  # Purpose: Row/column stride for By Row and Column screw placement.
  # Recommended: 2-4 for larger boards; ignored by other screw_mounting modes.
  screw_every_x_rows: 1
  screw_every_x_columns: 2

  # Purpose: Compact source-compatible pattern for Custom screw placement.
  # Recommended: leave at 011110 unless deliberately reproducing a source custom
  # pattern; ignored outside Custom mode.
  screw_custom_positions: "011110"

  # Purpose: Through screw hole diameter in millimeters.
  # Recommended: 4.1 mm for common #8/M4 clearance-style holes.
  screw_diameter: 4.1

  # Purpose: Screw head/counterbore diameter in millimeters.
  # Recommended: match actual fastener head plus printer clearance.
  screw_head_diameter: 7.2

  # Purpose: Distance from top surface to start of screw head relief.
  # Recommended: 1.0 mm for the default countersunk setup.
  screw_head_inset: 1.0

  # Purpose: Use conical countersink instead of cylindrical counterbore.
  # Recommended: true for flat-head screws; false for pan/socket head screws.
  screw_head_is_countersunk: true

  # Purpose: Countersink included angle in degrees.
  # Recommended: 90.0 for common metric/wood countersunk screws.
  screw_head_countersunk_degree: 90.0

  # Purpose: Add a thin backing plate under Lite boards for adhesive tape.
  # Recommended: false for Full/Heavy; true for adhesive-mounted Lite boards.
  add_adhesive_base: false

  # Purpose: Adhesive backing thickness in millimeters.
  # Recommended: 0.6 mm source default; ignored when add_adhesive_base is false.
  adhesive_base_thickness: 0.6

  # Purpose: Number of boards stacked in Z.
  # Recommended: 1 for normal exports; >1 only when verifying stacked interfaces.
  stack_count: 1

  # Purpose: Spacing method between stacked boards.
  # Options: Interface Layer, Ironing - BETA.
  # Recommended: Interface Layer unless intentionally testing ironing-mode gaps.
  stacking_method: Interface Layer

  # Purpose: Interface projection layer thickness for stacked boards.
  # Recommended: 0.4 mm source default.
  interface_thickness: 0.4

  # Purpose: Air gap around interface layers in stacked boards.
  # Recommended: 0.1 mm source default.
  interface_separation: 0.1

connector_slot_delete_tool:
  # Purpose: Negative cutter for adjacent-grid connector side slots.
  # Recommended: source defaults below for compatibility with the positive
  # adjacent-grid connector generated by adjacent_grid_connector.
  radius: 2.6
  dimple_radius: 2.7
  separation: 2.5
  height: 2.4
  flare_width: 1.0

adjacent_grid_connector:
  # Purpose: Positive double-sided connector that locks adjacent openGrid boards.
  # Recommended: 0.1 mm fit clearance for printed parts; lower for tight resin or
  # well-tuned printers, higher for rough FDM tolerance.
  fit_clearance: 0.1

multiconnect:
  # Purpose: Select Multiconnect profile preset or use custom dimensions.
  # Options: Standard, Jr., Mini, Multipoint Beta, Custom.
  # Recommended: Standard for normal Multiboard/OpenGrid compatibility.
  profile: Standard

  # Purpose: Select which source profile offset rules apply.
  # Options: Connector Round, Connector Rail, Connector Double sided Round,
  # Connector Double-Sided Rail, Connector Rail Delete Tool, Receiver Open-Ended,
  # Receiver Passthrough, Backer Open-Ended, Backer Passthrough.
  # Recommended: Connector Rail for male rail exports; receiver/backer options
  # are used internally by receiver/backer/delete-tool builders.
  part_kind: Connector Rail

  # Purpose: Rail/delete-tool/receiver length in millimeters.
  # Recommended: multiples of grid spacing for receiver/backer systems.
  length: 50.0

  # Purpose: Backer block width in millimeters.
  # Recommended: large enough to contain the intended number of grid-spaced slots.
  width: 75.0

  # Purpose: Slot spacing used by Multiconnect backers.
  # Recommended: 28.0 for openGrid; 25.0 when deliberately matching Multiboard.
  grid_size: 28.0

  # Purpose: Custom-profile dimensions. Used only when profile is Custom; named
  # presets ignore these values and use source constants.
  # Recommended: leave at Standard defaults unless designing a nonstandard rail.
  radius: 10.0
  capture_depth: 1.0
  dovetail_depth: 2.5
  stem_depth: 0.5
  receiver_offset: 0.15
  dimple_radius: 1.0

  # Purpose: Enable small dimple reliefs on Multiconnect rails/delete tools.
  # Recommended: true for source-like rails; false for simplified debug geometry.
  dimples_enabled: true

  # Purpose: Scale Multiconnect dimple size.
  # Recommended: 1.0 for source parity.
  dimple_scale: 1.0

  # Purpose: Rounded rail end caps.
  # Options: None, One Side, Both Sides.
  # Recommended: Both Sides for standalone connector rails; None for straight
  # delete tools or when ends are embedded in other geometry.
  rounding: Both Sides

  # Purpose: Receiver/backer wall thicknesses around negative rail slots.
  # Recommended: source-like defaults below for robust printed receivers.
  receiver_side_wall_thickness: 2.5
  receiver_back_thickness: 2.0
  receiver_top_wall_thickness: 2.5

  # Purpose: Add lead-in ramps to receiver/delete tools.
  # Recommended: true for easier insertion; false for envelope comparisons.
  on_ramps_enabled: true

  # Purpose: Ramp repetition across slot columns.
  # Recommended: 2 to ramp every other hole, matching current source behavior.
  on_ramp_every_n_holes: 2

  # Purpose: First slot index offset for on-ramp placement.
  # Recommended: 1 to stagger ramps from the first slot.
  on_ramp_start_offset: 1

snap_threads:
  # Purpose: Snap thread style.
  # Options: Basic, Blunt.
  # Recommended: Blunt for production because it helps prevent cross-threading
  # and overtightening; Basic for simpler source comparisons.
  thread_type: Blunt

  # Purpose: Thread height in millimeters.
  # Recommended: match snap body thickness for screws/snaps; 6.8 standard, 4.0
  # Lite, 3.4 Lite Basic.
  height: 6.8

  # Purpose: Nominal thread diameter before clearance.
  # Recommended: 16.0 mm source default.
  diameter: 16.0

  # Purpose: Added diameter clearance for negative/thread primitive generation.
  # Recommended: 0.5 for snap/negative compatibility; screws force this to 0.0
  # in examples/main.py to match source screw behavior.
  clearance: 0.5

  # Purpose: Thread pitch in millimeters.
  # Recommended: 3.0 mm source default.
  pitch: 3.0

  # Purpose: Top bevel height in millimeters.
  # Recommended: 0.5 mm source default.
  top_bevel: 0.5

  # Purpose: Bottom bevel height by standard/lite thickness.
  # Recommended: source defaults 2.0 and 1.2.
  bottom_bevel_standard: 2.0
  bottom_bevel_lite: 1.2

  # Purpose: Angular offset for thread sampling/profile alignment in degrees.
  # Recommended: 0.0 unless deliberately aligning threads to another part.
  offset_angle: 0.0

  # Purpose: Apply blunt lead-in/cutoff behavior for Blunt threads.
  # Recommended: true with thread_type Blunt; ignored for Basic geometry intent.
  blunt_cutoff: true

snap_body:
  # Purpose: Directional wall snap or symmetric horizontal snap body.
  # Options: Directional, Symmetric.
  # Recommended: Directional for vertical wall-mounted boards; Symmetric for
  # horizontal/Underware-style use.
  body_shape: Directional

  # Purpose: Outer snap body dimensions in millimeters.
  # Recommended: 24.8 x 24.8 source default for openGrid compatibility.
  width: 24.8
  height: 24.8

  # Purpose: Body thickness in millimeters.
  # Recommended: 6.8 standard, 4.0 Lite, or 3.4 Lite Basic.
  thickness: 6.8

  # Purpose: Vertical-edge chamfer size for the octagonal body core.
  # Recommended: source-derived default 4.818376618407356.
  corner_chamfer: 4.818376618407356

  # Purpose: Corner feature shaping values from opengrid_snap_lib.scad.
  # Recommended: keep defaults unless reproducing a specific custom SCAD setup.
  directional_corner_fillet_radius: 1.5
  corner_edge_height: 1.5
  top_corner_extrude: 1.1
  bottom_corner_extrude: 0.6

  # Purpose: Bottom and side relief cut dimensions.
  # Recommended: source defaults for printability and snap fit.
  cut_width_inset: 6.2
  bottom_cut_thickness: 0.6
  bottom_cut_offset_to_top: 0.6
  bottom_cut_offset_to_edge: 0.7
  side_cut_thickness: 0.4
  side_cut_depth: 0.8
  side_cut_offset_to_top: 0.8

  # Purpose: Directional lead-in slant dimensions by thickness family.
  # Recommended: source defaults; set enable_directional_slants false only for
  # isolated feature debugging.
  directional_slant_height_standard: 3.4
  directional_slant_height_lite: 1.2
  directional_slant_depth_standard: 0.8
  directional_slant_depth_lite: 0.2

  # Purpose: Basic nub dimensions used on symmetric sides and non-directional
  # faces of directional bodies.
  # Recommended: source defaults for openGrid snap retention.
  basic_nub_width_inset: 7.0
  basic_nub_depth: 0.4
  basic_nub_width_tip_taper: 4.0
  basic_nub_top_angle: 35.0
  basic_nub_bottom_angle: 35.0
  basic_nub_fillet_radius: 15.0
  basic_nub_height_standard: 2.0
  basic_nub_height_lite: 1.8

  # Purpose: Directional/anti-directional nub dimensions for wall-oriented snap
  # behavior.
  # Recommended: source defaults; tune only after physical fit testing.
  directional_nub_width_inset: 5.0
  directional_nub_depth: 0.8
  directional_nub_width_tip_taper: 1.6
  directional_nub_top_angle: 35.0
  directional_nub_height_standard: 4.0
  directional_nub_height_lite: 2.4
  directional_nub_bottom_angle_standard: 35.0
  directional_nub_bottom_angle_lite: 45.0
  directional_nub_fillet_radius: 2.8
  antidirect_nub_height_standard: 2.0
  antidirect_nub_height_lite: 1.4

  # Purpose: Distance from top face to nub placement.
  # Recommended: 1.4 mm source default.
  nub_offset_to_top: 1.4

  # Purpose: Front uninstall notch dimensions.
  # Recommended: keep enabled for removable snaps; set notch_width to 0 or
  # enable_uninstall_notch false only when a smooth front is required.
  notch_width: 5.0
  notch_surface_inset: 1.0
  notch_gap_inset: 1.8
  notch_surface_height_standard: 1.2
  notch_surface_height_lite: 0.8
  notch_gap_height_standard: 1.0
  notch_gap_height_lite: 0.6

  # Purpose: Feature toggles for isolated visual/reference checks.
  # Recommended: all true for production geometry; disable one at a time only
  # when debugging that feature.
  enable_corners: true
  enable_nubs: true
  enable_cuts: true
  enable_uninstall_notch: true
  enable_directional_slants: true

expanding_snap:
  # Purpose: Expansion distance by thickness family.
  # Recommended: 1.0 standard and 1.2 Lite source-tested defaults; tune only for
  # material/printer-specific fit.
  expand_distance_standard: 1.0
  expand_distance_lite: 1.2

  # Purpose: Entry lead-in height before threads begin expanding.
  # Recommended: source defaults; increase if screw starts poorly.
  expand_entry_height_standard: 0.4
  expand_entry_height_lite: 0.4
  expand_entry_height_blunt: 1.0

  # Purpose: Bottom/end expansion height by thickness family.
  # Recommended: do not reduce below thread bottom bevel without testing.
  expand_end_height_standard: 2.0
  expand_end_height_lite: 1.2

  # Purpose: Angular rotation of the spring split pattern in degrees.
  # Recommended: 45.0 source default.
  expand_split_angle: 45.0

  # Purpose: Spring wall/gap dimensions. Defaults are multiples of 0.42 mm line
  # width for common 0.4 mm nozzles.
  # Recommended: keep defaults unless tuning for a known filament/nozzle.
  spring_thickness: 1.26
  spring_to_center_thickness: 0.84
  spring_gap: 0.42
  spring_face_chamfer: 0.2

  # Purpose: Offset threaded/spring relief center from snap body center.
  # Recommended: [0.0, 0.0] for normal snaps; nonzero only for custom adapters.
  center_offset: [0.0, 0.0]

text_engraving:
  # Purpose: Optional cosmetic text/emoji engraving applied to product-level
  # assembled snaps and screw builders. Each list item creates one engraved text
  # tool. Empty list disables engraving.
  # Recommended: keep labels short; verify with SVG because font availability
  # changes visual output across machines.
  labels:
    # Purpose: Actual text to engrave. Short ASCII is most reliable; emoji may
    # require an installed font name in font.
    - text: "OG"
      # Purpose: Text height/size in millimeters.
      # Recommended: 3-4 mm for snap/screw heads.
      size: 3.2
      # Purpose: X/Y label center position on the top face.
      # Recommended: [0, 0] for centered screw labels; offset for multiple labels.
      position: [0.0, 0.0]
      # Purpose: Engraving depth in millimeters.
      # Recommended: 0.2-0.4 mm for legible but printable engraving.
      depth: 0.25
      # Purpose: Font family passed to build123d.Text.
      # Recommended: Arial for portability; use installed fonts for symbols.
      font: Arial
      # Purpose: true engraves from top surface; false engraves from bottom.
      # Recommended: true for visible labels.
      top: true

openconnect_head:
  # Purpose: Source openConnect rectangular head dimensions.
  # Recommended: defaults below match opengrid_parametric_snap.scad.
  bottom_height: 0.6
  top_height: 0.6
  middle_height: 1.4
  large_rect_width: 17.0
  large_rect_height: 10.6
  large_rect_chamfer: 4.0

  # Purpose: Lock nub relief placement and shape parameters.
  # Recommended: source defaults for openConnect slot compatibility.
  nub_to_top_distance: 7.2
  nub_depth: 0.6
  nub_tip_height: 1.2
  nub_fillet: 0.8
  back_pos_offset: 0.4

  # Purpose: Enable side lock reliefs/nubs on the head.
  # Recommended: true for functional openConnect heads; false for envelope tests.
  add_nubs: true

connector_slot:
  # Purpose: Screwdriver coin/flat slot dimensions subtracted from screw heads.
  # Recommended: source defaults; increase coin_slot_thickness for easier tool
  # insertion on rough prints.
  coin_slot_height: 2.6
  coin_slot_width: 13.0
  coin_slot_thickness: 2.2
  flat_slot_height: 5.0
  flat_slot_width: 6.5
  flat_slot_height_offset: 0.7
  flat_slot_start_thickness: 1.8
  flat_slot_end_thickness: 1.2

multiconnect_head:
  # Purpose: Round Multiconnect head dimensions used for snap adapters/screws.
  # Recommended: source defaults for Multiconnect compatibility.
  large_diameter: 20.0
  small_diameter: 15.0
  top_height: 0.5
  middle_height: 2.5
  bottom_height: 1.0

  # Purpose: Top feature on Multiconnect head.
  # Options: coin_slot, dimple, none.
  # Recommended: coin_slot for screws; dimple for simple snap head markers; none
  # for visual envelope checks.
  top_pattern: coin_slot

opengrid_snap:
  # Purpose: Product-level assembled snap variant.
  # Options: Bare, Basic Threads, Self-Expanding Threads, openConnect, multiConnect.
  # Recommended: openConnect for current openGrid connector ecosystem;
  # Self-Expanding Threads for integrated threaded snap tests; Bare for feature
  # isolation; multiConnect for round head compatibility checks.
  kind: openConnect

  # Purpose: Offset attachment/head/thread center from snap body center.
  # Recommended: [0.0, 0.0] unless building a custom shifted adapter.
  center_offset: [0.0, 0.0]

  # Purpose: Reverse basic thread entry side for assembled basic-thread snaps.
  # Recommended: false unless intentionally matching a reversed source export.
  reverse_threads_entryside: false

  # Purpose: Omit basic threads from Basic Threads variant while keeping body.
  # Recommended: false; true only for isolated body/head visual debugging.
  disable_threads: false

openconnect_screw:
  # Purpose: Enable folded openConnect screw intent flag in configuration.
  # Current implementation exports the non-folded screw geometry; the flag is
  # preserved so the YAML covers the public config and future folded geometry can
  # cut over without changing config shape.
  # Recommended: false for normal screw exports.
  folded: false
